name: CI

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.mise.toml'
      - 'migrations/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  BUN_VERSION: '1.3.14'

# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# COGS optimizations:
# - Single job (dependency-review merged) saves runner startup overhead
# - Path filters skip CI for docs/config-only changes
# - Concurrency cancels superseded runs
# - timeout-minutes caps runaway jobs
# - Sparse checkout reduces clone time
# - bun cache via setup-bun

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        sparse-checkout: |
          src
          __tests__
          package.json
          bun.lock
          bunfig.toml
          tsconfig.json
          worker-configuration.d.ts
          eslint.config.js
          .prettierrc
          .prettierignore
        sparse-checkout-cone-mode: false

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ env.BUN_VERSION }}

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Lint and test
      run: |
        bun run lint
        bun run format:check
        bun run test

    - name: Dependency review
      uses: actions/dependency-review-action@v5
      if: github.event_name == 'pull_request'
